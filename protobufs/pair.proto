syntax = "proto3";
import "communicationinfo.proto";
import "parameterrange.proto";
import "result.proto";

package org.derecalliance.derec.protobuf;

// SenderKind identifies the role of the sender of a pairing message.
enum SenderKind {
  // Sender is a sharer operating in normal (non-recovery) mode.
  SHARER_NON_RECOVERY = 0;

  // Sender is a sharer operating in recovery mode.
  SHARER_RECOVERY = 1;

  // Sender is acting as a helper.
  HELPER = 2;
}

// PairRequestMessage is the first message sent in the pairing protocol,
// from the pairing initiator to the pairing responder.
//
// Before this message is sent, the responder must have already provided
// contact information (ContactMessage) to the initiator through an
// out-of-band mechanism. For example, the responder may display a QR
// code that the initiator scans.
//
// The initiator can be either a helper or a sharer, and the responder
// can also be either a sharer or a helper.
message PairRequestMessage {

  // The role of the sender of this message.
  SenderKind senderKind = 1;

  // ML-KEM-768 ciphertext.
  bytes mlkemCiphertext = 3;

  // Serialized ECIES public key.
  bytes eciesPublicKey = 4;

  // Identifier used to reference the public encryption key.
  //
  // When a later message is sent to this initiator and encrypted with
  // the public encryption key, this identifier is included so the
  // recipient knows which key to use for decryption.
  //
  // If the recipient generates multiple keys for multiple pairings,
  // they should remember the publicKeyId chosen for each pairing so
  // that they do not need to try all keys during decryption.
  uint64 publicKeyId = 5;

  // Sender's application-readable contact information, such as name,
  // phone number, or other identifying information.
  CommunicationInfo communicationInfo = 6;

  // Random 64-bit nonce used to identify the pairing session.
  uint64 nonce = 7;

  // Parameter range supported by the sender.
  ParameterRange parameterRange = 8;
}

// PairResponseMessage is the response to PairRequestMessage.
//
// It is identical to the request except that it does not include the
// public encryption key, since that information was already exchanged
// through the ContactMessage.
message PairResponseMessage {

  // Result indicating success or failure of processing the request.
  Result result = 1;

  // The role of the sender of this message.
  SenderKind senderKind = 2;

  // Application-readable contact information (e.g., name, phone number).
  CommunicationInfo communicationInfo = 4;

  // Random 64-bit nonce identifying the pairing session.
  //
  // This must match the nonce sent in the pairing request.
  uint64 nonce = 5;

  // Parameter range supported by the sender.
  ParameterRange parameterRange = 6;
}
