syntax = "proto3";
import "result.proto";
import "parameterrange.proto";
import "google/protobuf/timestamp.proto";

package org.derecalliance.derec.protobuf;

// StoreShareRequestMessage requests that the helper store the provided share
// and remove any share versions not listed in keepList.
//
// If the share field is present, the helper is requested to store this
// version of the share. If the helper already stores this version, the
// request replaces the existing share. It is an error on the part of the
// sharer if two shares with the same version number and secret ID differ.
//
// If the keepList field is present, it updates the list of versions that
// must be retained. Any version not in the list should be deleted.
//
// If keepList is absent, the helper should continue using the existing
// keepList but add the newly received share version to the list.
//
// The keepList must be ignored if the version is less than the latest
// version already stored, in order to prevent replay attacks that could
// delete newer shares.
message StoreShareRequestMessage {

  // The share bytes that the sharer is requesting the helper to store.
  //
  // The helper does not need to know the details of the algorithm used to
  // construct the share and MUST treat it as an opaque byte string.
  bytes share = 1;

  // Identifier for the algorithm used to produce the share bytes (field 1).
  //
  // For interoperability purposes, there may be a registry of identifiers
  // and corresponding protobuf definitions describing the structure of
  // the share contents.
  //
  // Share algorithm 0 defines the share bytes as the serialized protobuf
  // message `CommittedDeRecShare`, defined in the DeRec Alliance
  // cryptography repository.
  //
  // Implementations are encouraged to support at least this algorithm to
  // improve interoperability between different sharer implementations.
  int32 shareAlgorithm = 2;

  // Version number of the share (the secretId is provided in the
  // enclosing DeRecMessage).
  int32 version = 3;

  // List of share versions that the helper must retain, including the
  // current version. Any version not listed here should be deleted.
  repeated int32 keepList = 4;

  // Optional description of the share version.
  //
  // This field is not encrypted and can be read by the helper. The sharer
  // may leave it empty or include information they are comfortable
  // revealing to the helper.
  string versionDescription = 5;
}

message StoreShareResponseMessage {
  Result result = 1;

  // Version number from the corresponding share request message.
  int32 version = 2;
}
