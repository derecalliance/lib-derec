syntax = "proto3";
import "result.proto";

package org.derecalliance.derec.protobuf;

// VerifyShareRequestMessage asks the helper to prove that it still holds
// the specified share version.
//
// The helper is expected to compute a cryptographic hash over the stored
// share bytes and the provided nonce, and return that value in a
// VerifyShareResponseMessage.
message VerifyShareRequestMessage {
  // Share version being challenged.
  int32 version = 1;

  // Random challenge nonce generated by the owner for this request.
  uint64 nonce = 2;
}

// VerifyShareResponseMessage returns the outcome of a verification request
// and, on success, includes the proof derived from the stored share and
// the challenge nonce.
message VerifyShareResponseMessage {
  // Result of processing the verification request.
  Result result = 1;

  // Share version this response refers to.
  int32 version = 2;

  // Challenge nonce echoed from the request.
  uint64 nonce = 3;

  // SHA-384 hash of the concatenation of:
  //   committedDeRecShare || nonce
  bytes hash = 4;
}
