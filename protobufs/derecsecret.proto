syntax = "proto3";
import "result.proto";
import "parameterrange.proto";
import "google/protobuf/timestamp.proto";

package org.derecalliance.derec.protobuf;

// DeRecSecret contains the sharer's data that will be encrypted and stored
// with helpers. It includes both the secret payload and metadata related
// to how the secret is managed.
//
// This is the standard format used with "algorithm 0" for creating shares.
message DeRecSecret {

  // Arbitrary data that the sharer wants to keep secret, such as keys,
  // passwords, documents, or other serialized secret data.
  bytes secretData = 1;

  // Timestamp indicating when the sharer created the shares of this secret.
  google.protobuf.Timestamp creationTime = 2;

  // Threshold number of helpers required to recover the secret.
  int64 helperThresholdForRecovery = 3;

  // Threshold number of helpers that must confirm receipt of a share
  // before the previous share version can be deleted.
  int64 helperThresholdForConfirmingShareReceipt = 4;

  repeated HelperSpecificInfo helpers = 5;

  message HelperSpecificInfo {

    // SHA-384 hash of the helper's public encryption key.
    bytes helper = 1;

    // Parameters agreed upon between the helper and the sharer.
    ParameterRange helperParams = 2;
  }
}
