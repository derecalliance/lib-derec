syntax = "proto3";

package org.derecalliance.derec.protobuf;

// Result represents the outcome of processing a DeRec protocol request.
//
// # Purpose
//
// This message is included in response messages to communicate:
//
// - whether a request was successfully processed
// - the type of failure (if any)
// - optional human-readable context for debugging or user display
//
// # Semantics
//
// A Result consists of:
//
// - a machine-readable `status` code
// - an optional `memo` providing additional context
//
// The `status` field MUST be used by implementations to determine
// protocol behavior. The `memo` field is informational only.
//
// # Usage
//
// - Every response message that can fail SHOULD include a Result
// - Senders MUST inspect the `status` field to determine next steps
// - The `memo` field MAY be displayed to users or logged for diagnostics
//
// # Security Considerations
//
// - The `memo` field SHOULD NOT include sensitive internal details
// - Only high-level or user-safe information should be exposed
//
// # Idempotency
//
// The Result reflects the outcome of a specific request. Repeated identical
// requests SHOULD produce consistent Result values unless system state changes.
message DeRecResult {
  // Status code indicating the outcome of the request.
  StatusEnum status = 1;

  // Optional human-readable description providing additional details.
  //
  // This field is intended for debugging, logging, or user display.
  // It MUST NOT be relied upon for programmatic decision-making.
  string memo = 2;
}

// StatusEnum defines the set of possible outcomes for processing
// DeRec protocol requests.
//
// # Semantics
//
// These values are used across all response messages to provide a consistent
// interpretation of success and failure conditions.
//
// Implementations MUST handle all known values and SHOULD safely ignore
// unknown values for forward compatibility.
enum StatusEnum {

  // The request was successfully handled.
  //
  // No further action is required by the sender.
  OK = 0;

  // The request was partially fulfilled.
  //
  // The `memo` field SHOULD provide additional context explaining which
  // parts succeeded and which did not.
  PARTIAL = 1;

  // The request failed for a generic or unspecified reason.
  //
  // The `memo` field MAY provide additional details.
  FAIL = 2;

  // The request failed because it would exceed the allowed storage limit
  // for this sharer and secret ID.
  //
  // This typically applies to share storage operations.
  SIZE_LIMIT_EXCEEDED = 3;

  // The request was ignored because it exceeded the allowed frequency.
  //
  // This may be used for rate limiting to prevent abuse or excessive load.
  TOO_FREQUENT = 4;

  // The specified secret ID is not recognized by the Helper.
  //
  // This may occur during recovery or share retrieval.
  UNKNOWN_SECRET_ID = 5;

  // The specified share version does not exist for the given secret ID.
  //
  // This may occur if the version was never stored or has been deleted.
  UNKNOWN_SHARE_VERSION = 6;

  // The message could not be decrypted successfully.
  //
  // This indicates a failure in the cryptographic layer, such as:
  //
  // - incorrect key material
  // - corrupted ciphertext
  DECRYPTION_FAILED = 7;

  // The message signature or authentication could not be verified.
  //
  // This indicates that the message integrity or authenticity check failed.
  VERIFICATION_FAILED = 8;

  // The message format is invalid.
  //
  // This includes errors such as:
  //
  // - protobuf parsing failures
  // - missing required fields
  // - structurally invalid messages
  FORMAT_ERROR = 9;

  // The Helper is requesting that the Owner terminate the relationship.
  //
  // The Owner SHOULD respond by sending an UnpairRequestMessage and
  // ceasing further communication on the channel.
  REQUEST_TO_CLOSE = 99;
}
