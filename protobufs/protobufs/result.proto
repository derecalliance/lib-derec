syntax = "proto3";

package org.derecalliance.derec.protobuf;

// Result indicates the success or failure of processing a request message.
message Result {
  StatusEnum status = 1;

  // Optional human-readable description providing additional details.
  string memo = 2;
}

// StatusEnum represents the outcome of processing a request,
// used in DeRec response messages.
enum StatusEnum {

  // The request was successfully handled.
  OK = 0;

  // The request was partially fulfilled. The memo field provides
  // additional details.
  PARTIAL = 1;

  // The request failed for a reason not covered by the specific
  // error codes below.
  FAIL = 2;

  // The request failed because it would cause the helper to store
  // more bytes for this sharer than the agreed limit for this secret ID.
  SIZE_LIMIT_EXCEEDED = 3;

  // The request is ignored because it was sent too frequently,
  // according to the agreed limit on request frequency.
  TOO_FREQUENT = 4;

  // The specified secret ID is not stored by this helper.
  UNKNOWN_SECRET_ID = 5;

  // The specified share version for this secret ID is not stored
  // by this helper.
  UNKNOWN_SHARE_VERSION = 6;

  // The received message could not be decrypted successfully.
  DECRYPTION_FAILED = 7;

  // The message signature could not be verified.
  VERIFICATION_FAILED = 8;

  // Format error, such as protobuf parsing failure or invalid
  // message structure.
  FORMAT_ERROR = 9;

  // The helper is requesting that the sharer send an unpair request.
  REQUEST_TO_CLOSE = 99;
}
