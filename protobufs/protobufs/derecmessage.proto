syntax = "proto3";
import "google/protobuf/timestamp.proto";
import "pair.proto";
import "unpair.proto";
import "storeshare.proto";
import "verify.proto";
import "getshare.proto";
import "secretidsversions.proto";
import "error.proto";

package org.derecalliance.derec.protobuf;

// DeRecMessage is the top-level protocol envelope for all messages except
// ContactMessage.
//
// This message is serialized as protobuf bytes, signed with the sender's
// private signature key, and then encrypted with the receiver's public
// encryption key. The signed-then-encrypted payload uses OpenPGP format.
// The sender transmits the concatenation of the recipient key ID followed
// by the signed-then-encrypted message. The key ID is a 32-bit signed
// integer in big-endian format and identifies which encryption key the
// recipient should use to decrypt the message.
//
// This envelope will usually contain only a single DeRec message. If it
// contains more than one, it is equivalent to sending them individually
// in the given order.
//
// This can contain multiple individual requests or responses, which are
// guaranteed to arrive together and in order, allowing atomic execution
// of several requests at once, such as updating a version and then
// immediately asking for a listing of all known versions.
message DeRecMessage {
  // DeRec protocol version number.
  int32 protocolVersionMajor = 1;
  int32 protocolVersionMinor = 2;

  // SHA-384 hash of the sender's public key, used to identify the sender
  // and the key.
  bytes sender = 3;

  // SHA-384 hash of the receiver's public key, used to prevent
  // signature-replacement attacks.
  bytes receiver = 4;

  // Secret ID, with any length from 1 to 16 bytes.
  //
  // Must be unique for each secret created by a sharer.
  bytes secretId = 5;

  // UTC timestamp indicating when the sender created this message.
  google.protobuf.Timestamp timestamp = 6;

  // Message body containing one of the possible DeRec message groups.
  MessageBodies messageBodies = 7;

  message MessageBodies {
    oneof messages {
      HelperMessageBodies helperMessageBodies = 1;
      SharerMessageBodies sharerMessageBodies = 2;
    }
  }

  // Contains one or more DeRec message bodies sent by a sharer.
  message SharerMessageBodies {
    repeated SharerMessageBody sharerMessageBody= 1;
  }

  message SharerMessageBody {
    oneof body {
      PairRequestMessage pairRequestMessage = 1;
      UnpairRequestMessage unpairRequestMessage = 2;
      StoreShareRequestMessage storeShareRequestMessage = 3;
      VerifyShareRequestMessage verifyShareRequestMessage = 4;
      GetSecretIdsVersionsRequestMessage getSecretIdsVersionsRequestMessage = 5;
      GetShareRequestMessage getShareRequestMessage = 6;
    }
  }

  // Contains one or more DeRec message bodies sent by a helper.
  message HelperMessageBodies {
    repeated HelperMessageBody helperMessageBody= 1;
  }

  message HelperMessageBody {
    oneof body {
      PairResponseMessage pairResponseMessage = 1;
      UnpairResponseMessage unpairResponseMessage = 2;
      StoreShareResponseMessage storeShareResponseMessage = 3;
      VerifyShareResponseMessage verifyShareResponseMessage = 4;
      GetSecretIdsVersionsResponseMessage getSecretIdsVersionsResponseMessage = 5;
      GetShareResponseMessage getShareResponseMessage = 6;
      ErrorResponseMessage errorResponseMessage = 7;
    }
  }
}
