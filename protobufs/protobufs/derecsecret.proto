syntax = "proto3";

import "result.proto";
import "parameterrange.proto";
import "google/protobuf/timestamp.proto";

package org.derecalliance.derec.protobuf;


// HelperSpecificInfo captures per-helper metadata associated with a secret.
//
// # Purpose
//
// This message binds a specific Helper to:
//
// - its identity (via a hash of its public encryption key)
// - the parameters agreed during pairing with the Owner
//
// This information allows the Owner to:
//
// - track which Helpers are associated with a given secret
// - reconstruct the correct configuration during recovery
// - verify that Helpers are operating under the expected parameters
//
// # Semantics
//
// Each entry represents one Helper participating in the secret sharing
// scheme. The collection of these entries defines the Helper set for
// a given version of the secret.
//
// # Identity Binding
//
// The `helper` field is a SHA-384 hash of the Helper's public encryption
// key. This provides a stable identifier without exposing the key itself.
//
// Implementations MUST ensure that:
//
// - the hash corresponds to the exact public key used during pairing
// - the mapping between Helper identity and key is preserved
//
// # Parameter Agreement
//
// The `helperParams` field records the parameter range agreed between
// the Owner and the Helper during pairing. This ensures that:
//
// - the share distribution is consistent with negotiated constraints
// - recovery can validate expected parameters
message HelperSpecificInfo {

  // SHA-384 hash of the Helper's public encryption key.
  //
  // This uniquely identifies the Helper within the context of the secret
  // without exposing the raw key material.
  bytes helper = 1;

  // Parameters agreed upon between the Helper and the Owner.
  //
  // These parameters originate from the intersection of both parties'
  // supported ranges during pairing.
  ParameterRange helperParams = 2;
}


// DeRecSecret represents the canonical structure of the secret material
// that is encrypted and distributed across Helpers.
//
// # Context
//
// Before distribution:
//
// - the Owner constructs a DeRecSecret
// - the `secretData` is encrypted (e.g., via AES-GCM)
// - the encryption key is split using a secret sharing scheme (e.g., Shamir)
//
// The resulting shares are then distributed to Helpers.
//
// This message defines the structure used by "share algorithm 0".
//
// # Semantics
//
// A DeRecSecret contains:
//
// - the raw secret payload
// - metadata describing the sharing configuration
// - the set of Helpers and their associated parameters
//
// This metadata is critical for:
//
// - reconstructing the secret during recovery
// - validating the integrity and configuration of shares
//
// # Thresholds
//
// Two thresholds are defined:
//
// 1. Recovery threshold:
//    - Minimum number of Helpers required to reconstruct the secret
//
// 2. Confirmation threshold:
//    - Minimum number of Helpers that must acknowledge receipt of a new
//      share version before older versions can be safely deleted
//
// # Security Considerations
//
// - The entire DeRecSecret MUST be encrypted before distribution
// - Helpers MUST NOT have access to the plaintext secretData
// - Metadata should not leak sensitive information beyond what is required
//
// # Versioning
//
// Each share distribution version implicitly corresponds to a snapshot
// of this structure. Changes to:
//
// - secretData
// - helper set
// - thresholds
//
// result in a new version being generated and distributed.
message DeRecSecret {

  // Arbitrary secret payload.
  //
  // This may include cryptographic keys, credentials, documents, or any
  // serialized data the Owner wishes to protect.
  bytes secretData = 1;

  // Timestamp indicating when this secret (or this version of it) was created.
  //
  // Used for auditing, version tracking, and observability.
  google.protobuf.Timestamp creationTime = 2;

  // Minimum number of Helpers required to reconstruct the secret.
  //
  // This corresponds to the threshold parameter of the underlying
  // secret sharing scheme.
  int64 helperThresholdForRecovery = 3;

  // Minimum number of Helpers that must confirm receipt of a share
  // before older versions can be deleted.
  //
  // This ensures that sufficient redundancy exists before removing
  // previous share versions.
  int64 helperThresholdForConfirmingShareReceipt = 4;

  // List of Helpers participating in this secret.
  //
  // Each entry defines:
  //
  // - the identity of the Helper
  // - the parameters agreed with that Helper
  //
  // The size of this list defines the total number of shares generated.
  repeated HelperSpecificInfo helpers = 5;
}
