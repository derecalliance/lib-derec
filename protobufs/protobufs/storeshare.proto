syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "result.proto";

package org.derecalliance.derec.protobuf;

// StoreShareRequestMessage instructs a Helper to store a share for a given
// secret and manage the set of retained share versions.
//
// # Context
//
// This message is used in the sharing flow when:
//
// - a new secret is created
// - an existing secret is updated
// - the helper set or recovery threshold changes
//
// The Owner sends this message to each Helper to:
//
// - store (or replace) a specific share version
// - update the set of versions that must be retained (keepList)
//
// # Semantics
//
// This message may carry two independent instructions:
//
// 1. Share storage/update:
//    - If `share` is present, the Helper MUST store this share under the
//      specified `version`
//    - If the version already exists, the Helper MUST replace it
//
// 2. Retention policy update:
//    - If `keepList` is present, it defines the complete set of versions
//      that MUST be retained
//    - Any stored version not in `keepList` SHOULD be deleted
//
// If `keepList` is absent:
//
// - The Helper MUST preserve the existing keepList
// - The Helper MUST add the new `version` to the retained set
//
// # Consistency Requirements
//
// The Owner MUST ensure that for a given (secretId, version):
//
// - all Helpers receive identical share contents
//
// It is an error for different shares to be associated with the same
// version and secretId.
//
// # Replay Protection
//
// To prevent replay attacks:
//
// - If `version` is less than the latest stored version,
//   the Helper MUST ignore the `keepList` field
//
// This ensures that stale messages cannot cause deletion of newer shares.
//
// # Share Opacity
//
// The Helper MUST treat the `share` field as opaque data. It is not required
// to understand or validate the share contents.
//
// # Idempotency
//
// This message is idempotent:
//
// - Re-sending the same (version, share) pair SHOULD result in the same state
// - Re-applying the same keepList SHOULD not change state after the first time
message StoreShareRequestMessage {

  // Share bytes to be stored by the Helper.
  //
  // This is an opaque byte array produced by the share distribution
  // algorithm. The Helper MUST store it without interpretation.
  bytes share = 1;

  // Identifier of the algorithm used to produce the share.
  //
  // This allows the Owner and Helper to coordinate on how the share
  // should be interpreted during recovery.
  //
  // Algorithm 0 defines the share as a serialized `CommittedDeRecShare`
  // protobuf message (see DeRec cryptography repository).
  //
  // Implementations SHOULD support algorithm 0 for interoperability.
  int32 shareAlgorithm = 2;

  // Version number of the share.
  //
  // Each resharing event increments this value. The secretId is provided
  // in the enclosing DeRecMessage.
  int32 version = 3;

  // List of share versions that MUST be retained by the Helper.
  //
  // Any stored version not included in this list SHOULD be deleted.
  //
  // If absent, the Helper MUST:
  //
  // - retain the existing keepList
  // - add the current `version` to the retained set
  //
  // This field MUST be ignored if `version` is older than the latest
  // version already stored, to prevent replay attacks.
  repeated int32 keepList = 4;

  // Optional human-readable description of this share version.
  //
  // This field is visible to the Helper and is not intended to carry
  // sensitive information. It may be used for debugging, labeling, or
  // user-facing display.
  string versionDescription = 5;

  // Timestamp indicating when this message was created.
  //
  // Used for observability, replay detection, and timeout handling.
  google.protobuf.Timestamp timestamp = 6;
}

// StoreShareResponseMessage is the response to a StoreShareRequestMessage.
//
// # Semantics
//
// This message indicates whether the Helper successfully:
//
// - stored or updated the requested share version
// - applied the retention policy (keepList)
//
// # Idempotency
//
// Multiple identical requests SHOULD produce identical responses.
message StoreShareResponseMessage {

  // Result of processing the request.
  //
  // Indicates success or failure of the storage/update operation.
  DeRecResult result = 1;

  // Version number from the corresponding request.
  //
  // This allows the sender to correlate responses with requests.
  int32 version = 2;

  // Timestamp indicating when this message was created.
  //
  // Used for observability, replay detection, and timeout handling.
  google.protobuf.Timestamp timestamp = 3;
}
