syntax = "proto3";
import "result.proto";

package org.derecalliance.derec.protobuf;

// GetSecretIdsVersionsRequestMessage requests all secret IDs held by the
// helper for this sharer, along with the share versions stored for each
// of those secrets. This message is used during recovery.
message GetSecretIdsVersionsRequestMessage {
}


// GetSecretIdsVersionsResponseMessage returns all secret IDs associated
// with the sharer, along with the list of share versions stored by the
// helper for each secret.
//
// This message is used during recovery. The helper must authenticate the
// sharer in a way that allows them to identify which stored secrets belong
// to that sharer. Authentication may be based on biometrics, out-of-band
// credentials, or manual identification by a human helper.
//
// This request is only processed successfully if it is received through
// the communication channel associated with a secret ID created during
// recovery mode.
message GetSecretIdsVersionsResponseMessage {

  // Result indicating success or failure of processing the request.
  Result result = 1;

  // List of VersionList entries, one for each secret ID stored by the
  // helper for this sharer.
  repeated VersionList secretList = 2;

  // VersionList contains the list of share versions stored by the helper
  // for a given secret ID.
  message VersionList {
    bytes secretId = 1;
    repeated int32 versions = 2;
  }
}
