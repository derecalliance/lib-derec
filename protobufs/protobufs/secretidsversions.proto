syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "result.proto";

package org.derecalliance.derec.protobuf;

// GetSecretIdsVersionsRequestMessage requests the list of all secrets and
// corresponding share versions that a Helper stores for a given Owner.
//
// # Context
//
// This message is used during the recovery flow, after the Owner has
// re-paired with a Helper (typically in recovery mode).
//
// Since the recovering Owner does not know which secrets or versions
// the Helper holds, this message allows discovery of:
//
// - all secretIds associated with the Owner
// - all share versions stored for each secret
//
// # Semantics
//
// The Helper responds with a GetSecretIdsVersionsResponseMessage containing:
//
// - one entry per secretId
// - the list of versions stored for each secret
//
// # Authorization Rules
//
// The Helper MUST only fully process this request if it is received through
// a communication channel that was established in recovery mode and has been
// associated (via authentication) with the same Owner as previously stored
// secrets.
//
// If this condition is not met, the Helper MAY:
//
// - return only partial information (e.g., for the current channel), or
// - reject the request entirely
//
// # Authentication
//
// The Helper MUST authenticate the requester at the application level before
// disclosing any information about stored secrets. Authentication is outside
// the scope of the protocol and may include:
//
// - in-person verification
// - KYC processes
// - biometrics or credentials
//
// # Idempotency
//
// This request is idempotent. Repeated requests SHOULD return the same
// information unless the underlying storage changes.
message GetSecretIdsVersionsRequestMessage {
  // Timestamp indicating when this message was created.
  //
  // This value is expressed in UTC and can be used for:
  //
  // - observability and logging
  // - replay detection (in combination with sequence numbers)
  // - timeout handling
  google.protobuf.Timestamp timestamp = 1;
}


// GetSecretIdsVersionsResponseMessage returns the list of all secrets and
// their corresponding share versions stored by the Helper for the Owner.
//
// # Semantics
//
// Each entry in `secretList` represents:
//
// - a `secretId` previously shared by the Owner
// - the list of share versions currently stored for that secret
//
// This allows the recovering Owner to:
//
// - discover which secrets exist
// - determine which versions to request via GetShareRequestMessage
//
// # Authorization and Privacy
//
// The Helper MUST ensure that:
//
// - the requester is authenticated as the same Owner
// - the request originates from a recovery-mode channel
//
// Only under these conditions may the Helper return the full list of secrets.
//
// Otherwise, the Helper MUST:
//
// - return partial data (e.g., only for the current secretId), or
// - return a failure result
//
// # Security Considerations
//
// - This message reveals metadata about stored secrets
// - It MUST only be sent over an authenticated and encrypted channel
// - Unauthorized disclosure could leak information about user activity
//
// # Idempotency
//
// For a given Helper state, repeated responses SHOULD return the same data.
message GetSecretIdsVersionsResponseMessage {

  // Result of processing the request.
  //
  // Indicates whether the request was successfully processed or rejected.
  DeRecResult result = 1;

  // List of secrets and their stored versions.
  //
  // Each entry corresponds to one secretId and the versions available
  // for that secret.
  repeated VersionList secretList = 2;

  // Timestamp indicating when this message was created.
  //
  // This value is expressed in UTC and can be used for:
  //
  // - observability and logging
  // - replay detection (in combination with sequence numbers)
  // - timeout handling
  google.protobuf.Timestamp timestamp = 3;

  // VersionList groups the share versions stored for a single secretId.
  //
  // # Semantics
  //
  // - `secretId` uniquely identifies a secret
  // - `versions` lists all share versions currently stored for that secret
  //
  // The order of versions is not significant unless defined by the
  // implementation.
  message VersionList {
    // Identifier of the secret.
    bytes secretId = 1;

    // List of share versions stored for this secret.
    repeated int32 versions = 2;
  }
}
