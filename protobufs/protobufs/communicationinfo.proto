syntax = "proto3";

package org.derecalliance.derec.protobuf;

// CommunicationInfoKeyValue represents a single application-defined
// key-value pair used to convey user-facing identification data.
//
// # Purpose
//
// This structure is intended for:
//
// - displaying human-readable information to users during pairing
// - helping users identify and confirm counterparties
// - providing contextual metadata for UI/UX purposes
//
// # Semantics
//
// - The `key` is an application-defined identifier (e.g., "name", "phone")
// - The `value` contains the associated data, either as a string or raw bytes
//
// The protocol does not interpret these fields; they are opaque to the
// DeRec protocol and are only intended for application-level use.
//
// # Encoding
//
// Exactly one of the `value` fields MUST be set.
//
// Implementations SHOULD:
//
// - prefer `stringValue` for human-readable data
// - use `bytesValue` for structured or binary data (e.g., encoded identifiers)
//
// # Interoperability
//
// Applications SHOULD use consistent and well-known keys where possible
// (e.g., "name", "email", "phone") to improve cross-implementation UX,
// but no global registry is enforced by the protocol.
message CommunicationInfoKeyValue {
  // Application-defined key identifying the type of information.
  //
  // Examples include "name", "email", "phone", or "accountId".
  string key = 1;

  // Value associated with the key.
  //
  // Exactly one of the following fields MUST be set.
  oneof value {
    // Human-readable string value.
    //
    // This is the preferred representation for most user-facing data.
    string stringValue = 2;

    // Binary value.
    //
    // May be used for structured or encoded data that is not naturally
    // represented as a string.
    bytes bytesValue = 3;
  }
}

// CommunicationInfo contains application-level identifying information
// about a participant (Owner or Helper).
//
// # Purpose
//
// This message is used to:
//
// - present identifying details to users during pairing
// - assist users in verifying the identity of the counterparty
// - provide contextual metadata for UI display
//
// # Semantics
//
// - The contents are entirely application-defined
// - The protocol does not validate, interpret, or enforce any schema
// - Entries are independent key-value pairs
//
// # Security Considerations
//
// - This data MUST NOT be relied upon for authentication
// - Authentication is handled outside the protocol (e.g., in-person,
//   KYC, or application-specific mechanisms)
//
// # Privacy Considerations
//
// - Applications SHOULD avoid including sensitive information unless
//   necessary for the user experience
// - Users should be informed about what data is being shared
//
// # Interoperability
//
// While no schema is enforced, using common keys improves usability
// across implementations.
message CommunicationInfo {
  // List of key-value entries describing the participant.
  //
  // Each entry represents one piece of identifying information.
  repeated CommunicationInfoKeyValue communicationInfoEntries = 1;
}
