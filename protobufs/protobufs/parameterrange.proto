syntax = "proto3";

package org.derecalliance.derec.protobuf;

message ParameterRange {

  // Minimum and maximum number of bytes the party is willing to store
  // at any given time.
  int64 minShareSize = 1;
  int64 maxShareSize = 2;

  // Minimum and maximum interval between verification requests that
  // will be accepted.
  int64 minTimeBetweenVerifications = 3;
  int64 maxTimeBetweenVerifications = 4;

  // Minimum and maximum interval between accepting new share updates.
  int64 minTimeBetweenShareUpdates = 5;
  int64 maxTimeBetweenShareUpdates = 6;

  // Minimum and maximum timeout period (in seconds) after which the
  // other party is considered unresponsive and the pairing may be
  // removed along with all associated data.
  int64 minUnresponsiveDeletionTimeout = 7;
  int64 maxUnresponsiveDeletionTimeout = 8;

  // Minimum and maximum timeout period (in seconds) after which the
  // other party is considered inactive.
  int64 minUnresponsiveDeactivationTimeout = 9;
  int64 maxUnresponsiveDeactivationTimeout = 10;
}
