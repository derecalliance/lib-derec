syntax = "proto3";
import "result.proto";

package org.derecalliance.derec.protobuf;

// UnpairRequestMessage requests that the other party cease acting as a
// helper and delete any information related to the sharer and their
// relationship.
//
// Exceptions may apply for information that must be retained due to
// regulatory requirements, service agreements, or other obligations.
message UnpairRequestMessage {

  // Human-readable explanation for why the unpairing occurred.
  string memo = 1;
}

// UnpairResponseMessage is the response to an unpair request.
message UnpairResponseMessage {
  Result result = 1;
}
