syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "result.proto";
import "transportprotocol.proto";

package org.derecalliance.derec.protobuf;


// VerifyShareRequestMessage initiates a verification challenge from the Owner
// to a Helper to confirm that the Helper still retains a specific share.
//
// # Context
//
// This message is part of the verification flow, which allows the Owner to:
//
// - periodically check Helper liveness
// - detect data loss or corruption of stored shares
// - identify Helpers that are no longer reliable for recovery
//
// # Semantics
//
// The Owner challenges the Helper by providing:
//
// - a `version` identifying the share to verify
// - a fresh `nonce` to ensure the response is unique and not replayable
//
// The Helper MUST compute a cryptographic hash over:
//
//   committedDeRecShare || nonce
//
// and return the result in a VerifyShareResponseMessage.
//
// # Security Properties
//
// - The nonce ensures freshness and prevents replay attacks
// - The hash proves possession of the exact share bytes
// - The Helper cannot produce a valid response without holding the share
//
// # Idempotency
//
// Each request is uniquely identified by the nonce. Reusing a nonce SHOULD
// be avoided, as it weakens replay protection guarantees.
message VerifyShareRequestMessage {
  // Secret id being challenged.
  //
  // This identifies which stored share for a secret the Helper must use to compute
  // the verification proof.
  uint64 secretId = 1;

  // Share version being challenged.
  //
  // This identifies which stored share version the Helper must use to compute
  // the verification proof.
  uint32 version = 2;

  // Random challenge nonce generated by the Owner.
  //
  // This value MUST be unpredictable and unique per request to ensure
  // freshness and prevent replay of previous responses.
  uint64 nonce = 3;

  // Timestamp indicating when this message was created.
  //
  // This value is expressed in UTC and can be used for:
  //
  // - observability and logging
  // - replay detection (in combination with sequence numbers)
  // - timeout handling
  google.protobuf.Timestamp timestamp = 4;

  // Ephemeral transport endpoint at which the requester wants to receive
  // the response to *this exchange*, overriding the channel's stored peer
  // endpoint for this round-trip only.
  //
  // See `StoreShareRequestMessage.replyTo` for full semantics. Absent =
  // route to the stored channel endpoint; Present = route this response
  // here without persisting the endpoint.
  optional TransportProtocol replyTo = 5;
}

// VerifyShareResponseMessage contains the result of a verification challenge
// and, on success, provides a proof of share possession.
//
// # Semantics
//
// In response to a VerifyShareRequestMessage, the Helper:
//
// - retrieves the requested share version
// - computes the hash over (committedDeRecShare || nonce)
// - returns the result along with the echoed version and nonce
//
// The Owner verifies the response by recomputing the expected hash and
// comparing it with the received value.
//
// # Failure Handling
//
// If the verification fails (e.g., incorrect hash or error result), the Owner:
//
// - MAY retry the verification
// - MAY resend the correct share to the Helper
// - MAY mark the Helper as unreliable after repeated failures
//
// # Security Considerations
//
// - The hash MUST be computed using SHA-384 as defined by the protocol
// - The nonce MUST match the request to ensure the response is not replayed
// - The response MUST be sent over an authenticated and encrypted channel
//
// # Idempotency
//
// Responses are tied to a specific (version, nonce) pair. Replaying a response
// with a stale nonce SHOULD be rejected by the Owner.
message VerifyShareResponseMessage {
  // Result of processing the verification request.
  //
  // Indicates whether the Helper successfully computed the proof or
  // encountered an error (e.g., share not found).
  DeRecResult result = 1;

  // Secret id this response refers to.
  //
  // MUST match the version provided in the request.
  uint64 secretId = 2;

  // Share version this response refers to.
  //
  // MUST match the version provided in the request.
  uint32 version = 3;

  // Challenge nonce echoed from the request.
  //
  // MUST exactly match the nonce provided in the request.
  uint64 nonce = 4;

  // Verification proof.
  //
  // This is the SHA-384 hash of:
  //
  //   committedDeRecShare || nonce
  //
  // where `committedDeRecShare` is the exact byte sequence originally
  // stored by the Helper.
  bytes hash = 5;

  // Timestamp indicating when this message was created.
  //
  // This value is expressed in UTC and can be used for:
  //
  // - observability and logging
  // - replay detection (in combination with sequence numbers)
  // - timeout handling
  google.protobuf.Timestamp timestamp = 6;
}
