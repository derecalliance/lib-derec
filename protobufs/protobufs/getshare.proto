syntax = "proto3";
import "result.proto";
import "storeshare.proto";

package org.derecalliance.derec.protobuf;

// GetShareRequestMessage requests a share stored by the helper.
message GetShareRequestMessage {

  // Secret ID (any length from 1 to 16 bytes) for the requested share.
  // Must be unique for each secret created by a sharer.
  bytes secretId = 1;

  // Version of the share being requested.
  int32 shareVersion = 2;
}

// GetShareResponseMessage returns the requested share to the sharer.
//
// The request is only processed if it arrives through the communication
// channel associated with either:
// - the same secret ID being requested, or
// - a secret ID created in recovery mode.
message GetShareResponseMessage {

  // Result indicating success or failure when processing the request.
  Result result = 1;

  // The committed DeRec share.
  bytes committedDeRecShare = 2;

  // Identifier of the share algorithm used to produce the share.
  int32 shareAlgorithm = 3;
}
