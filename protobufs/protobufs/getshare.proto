syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "result.proto";

package org.derecalliance.derec.protobuf;

// GetShareRequestMessage requests a previously stored share from a Helper.
//
// # Context
//
// This message is used during the recovery flow, after pairing has been
// established (typically in recovery mode). Once a Helper has indicated
// which secret IDs and versions it holds, the Owner sends this request
// to retrieve specific shares.
//
// # Semantics
//
// The request identifies a share by:
//
// - `secretId`: the identifier of the protected secret
// - `shareVersion`: the version of the share distribution
//
// The Helper is expected to locate the corresponding share and return it
// in a GetShareResponseMessage.
//
// # Authorization Rules
//
// The Helper MUST only process this request if it is received through a
// valid communication channel that is authorized to access the requested
// share. Specifically:
//
// - the request MUST originate from the same secretId channel, OR
// - the request MUST originate from a channel established in recovery mode
//   and associated with the same user
//
// Otherwise, the Helper MUST reject the request.
//
// # Idempotency
//
// This request is idempotent. Repeated requests for the same (secretId,
// shareVersion) pair SHOULD return the same result.
message GetShareRequestMessage {

  // Identifier of the secret for which the share is requested.
  //
  // This is an opaque byte array (1 to 16 bytes) generated by the Owner
  // when the secret is created. It uniquely identifies the secret within
  // the context of the Owner and its Helpers.
  bytes secretId = 1;

  // Version of the share being requested.
  //
  // Each time a secret is reshared (e.g., due to updates or changes in
  // helper set), a new version is created. This field specifies which
  // version of the share should be returned.
  int32 shareVersion = 2;

  // Timestamp indicating when this message was created.
  //
  // This value is expressed in UTC and can be used for:
  //
  // - observability and logging
  // - replay detection (in combination with sequence numbers)
  // - timeout handling
  google.protobuf.Timestamp timestamp = 3;
}

// GetShareResponseMessage returns a share previously stored by the Helper.
//
// # Semantics
//
// This message is sent in response to a GetShareRequestMessage. It either:
//
// - returns the requested share (on success), or
// - indicates failure via the `result` field
//
// # Authorization Enforcement
//
// The Helper MUST ensure that the request satisfies the authorization rules
// described in GetShareRequestMessage before returning any share data.
//
// # Share Contents
//
// The returned share is an opaque byte sequence that typically includes:
//
// - the Shamir share (x, y)
// - the encrypted secret payload (or a reference to it)
// - the commitment (e.g., Merkle root)
// - the opening proof for verification
//
// The exact structure is defined by the share algorithm indicated in
// `shareAlgorithm`.
//
// # Security Considerations
//
// - The share MUST only be returned over an authenticated and encrypted
//   DeRec channel
// - Incorrect or malicious shares may be detected by the Owner during
//   recovery using commitment verification
//
// # Idempotency
//
// For a given (secretId, shareVersion), repeated responses SHOULD return
// the same share data.
message GetShareResponseMessage {

  // Result of processing the request.
  //
  // Indicates whether the share was successfully retrieved or if an error
  // occurred (e.g., unauthorized request, unknown secretId, or missing version).
  DeRecResult result = 1;

  // The committed DeRec share.
  //
  // This is an opaque byte array containing the share data as produced by
  // the share distribution algorithm. Its internal structure depends on
  // `shareAlgorithm`.
  bytes committedDeRecShare = 2;

  // Identifier of the share algorithm used to produce the share.
  //
  // This allows the recipient to interpret and process the share correctly
  // during verification and reconstruction.
  int32 shareAlgorithm = 3;

  // Timestamp indicating when this message was created.
  //
  // This value is expressed in UTC and can be used for observability,
  // replay detection, and timeout handling.
  google.protobuf.Timestamp timestamp = 4;
}
