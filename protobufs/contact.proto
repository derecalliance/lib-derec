syntax = "proto3";
package org.derecalliance.derec.protobuf;

// ContactMessage is the only protocol message that is not wrapped inside
// a DeRecMessage.
//
// It is not encrypted, not signed, and not transmitted through the normal
// protocol channels. Instead, it is exchanged out-of-band between the
// two parties before the protocol begins.
//
// Typical transport mechanisms include:
// - QR codes displayed by either the helper or the sharer and scanned by
//   the other party
// - Distribution inside an application provided by one party to the other
// - Transmission through an existing communication channel if the parties
//   already have a prior relationship
//
// The nonce may also be transmitted separately from the rest of the message.
message ContactMessage {

  // Serialized ML-KEM-768 encapsulation key.
  bytes mlkemEncapsulationKey = 1;

  // Serialized ECIES public key.
  bytes eciesPublicKey = 2;
 
  // Identifier used to reference the public encryption key.
  //
  // When a message is sent to the creator of this contact and encrypted
  // with the public encryption key, this identifier is included so the
  // recipient knows which key to use for decryption.
  //
  // If the recipient generates multiple keys for multiple pairings, they
  // should remember the publicKeyId associated with each one so that they
  // do not need to try all keys during decryption.
  uint64 publicKeyId = 3;

  // Random 64-bit nonce used to identify the pairing session.
  //
  // This should be given to the other party only after authentication.
  uint64 nonce = 4;

  // URI endpoint used to contact the helper or sharer.
  //
  // This can be an HTTPS endpoint or a RabbitMQ endpoint.
  string transportUri = 5;

  // Transport protocol that the transportUri represents.
  //
  // This indicates how the endpoint should be interpreted and how protocol
  // messages should be delivered to the recipient.
  TransportProtocol transportProtocol = 6;

  enum TransportProtocol {
    HTTPS = 0;
  }
}
