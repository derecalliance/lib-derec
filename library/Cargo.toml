[package]
name = "derec-library"
version = "0.0.1-alpha.8"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
description = "Rust SDK for the DeRec protocol, including native and WebAssembly bindings."
readme = "README.md"
repository = "https://github.com/derecalliance/lib-derec"
documentation = "https://derec-alliance.gitbook.io/docs/sdk/rust"
homepage = "https://derecalliance.org"
keywords = ["derec", "decentralized", "recovery", "secret-sharing", "sdk"]

include = [
  "src/**",
  "Cargo.toml",
  "README.md",
  "LICENSE",
]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# derec-cryptography =  "0.0.1-alpha.6"
# derec-proto =  "0.0.1-alpha.6"
derec-cryptography = { path = "../cryptography" }
derec-proto = { path = "../protobufs" }
prost = "0.14.4"
prost-types = "0.14.4"
rand = { version = "0.10.2", features = ["sys_rng"] }
sha2 = "0.11.0"
serde = { version = "1.0.229", features = ["derive"], optional = true }
serde_json = { version = "1.0.151", optional = true }
ark-serialize = { version = "0.6.0", default-features = true }
thiserror = "2.0.19"
zeroize = "1.9.0"
subtle = "2.6.1"
k256 = { version = "0.14.0", features = ["ecdsa"] }
tracing = { version = "0.1.44", default-features = false, features = ["attributes"], optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1.53.1", features = ["rt"], default-features = false }

[target.'cfg(target_arch = "wasm32")'.dependencies]
# The WASM bridge always marshals via serde, so serde / serde_json are
# non-optional here and `derec-proto` is pulled with its `serde` feature.
# This keeps `wasm32` building without the caller having to pass
# `--features serde`, while native builds keep serde fully optional.
serde = { version = "1.0.229", features = ["derive"] }
serde_json = "1.0.151"
derec-proto = { path = "../protobufs", features = ["serde"] }
wasm-bindgen = { version = "0.2.126", features = ["serde-serialize"] }
wasm-bindgen-futures = { version = "0.4.76" }
serde-wasm-bindgen = { version = "0.6.5" }
serde_bytes = "0.11.19"
js-sys = { version = "0.3.103" }
web-sys = { version = "0.3.103", features = ["console"] }
getrandom_02 = { package = "getrandom", version = "0.2.17", features = ["js"] }
getrandom_04 = { package = "getrandom", version = "0.4.3", features = ["wasm_js"] }
console_error_panic_hook = "0.1.7"

[features]
primitives = []
logging = ["dep:tracing"]
# Native C-ABI bridge. Marshals across the boundary as JSON, so it pulls
# in serde + serde_json. Off by default; an rlib consumer that does not
# build the C bridge compiles none of it.
ffi = ["serde", "dep:serde_json"]
# Opt-in `serde::Serialize` / `Deserialize` on the public store/channel
# types so consumers can persist them with any serde format. Off by
# default — consumers who prefer the byte-level accessors or another
# format compile no serde at all. Also pulls the matching `derec-proto`
# serde so `Channel`'s embedded protobuf fields serialize.
serde = ["dep:serde", "derec-proto/serde"]
# Opt-in development affordance: lets `TransportProtocol::validate`
# accept plaintext `http://` URIs (still emits `tracing::warn!` under
# `logging`). OFF by default — production callers MUST keep it off,
# since enabling it also lets a peer-supplied `reply_to` downgrade
# the reply path to plaintext.
unsafe-http = []

[dev-dependencies]
rand08 = { package = "rand", version = "0.8.5" }
serde_json = "1.0.151"

