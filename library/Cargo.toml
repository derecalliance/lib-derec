[package]
name = "derec-library"
version = "0.0.1-alpha.6"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
description = "Rust SDK for the DeRec protocol, including native and WebAssembly bindings."
readme = "README.md"
repository = "git+https://github.com/derecalliance/lib-derec"
documentation = "https://derec-alliance.gitbook.io/docs/sdk/rust"
homepage = "https://derecalliance.org"
keywords = ["derec", "decentralized", "recovery", "secret-sharing", "sdk"]

include = [
  "src/**",
  "Cargo.toml",
  "README.md",
  "LICENSE",
]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
derec-cryptography =  "0.0.1-alpha.6"
derec-proto =  "0.0.1-alpha.6"
prost = "0.14.3"
prost-types = "0.14.3"
rand = { version = "0.10.0", features = ["sys_rng"] }
sha2 = "0.10.9"
serde = { version = "1.0", features = ["derive"] }
ark-serialize = { version = "0.5.0", default-features = true }
thiserror = "2.0.18"
zeroize = "1.8.2"
subtle = "2.6.1"
k256 = { version = "0.13.4", features = ["ecdsa"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { version = "0.2.114", features = ["serde-serialize"] }
serde-wasm-bindgen = { version = "0.6.5" }
js-sys = { version = "0.3.91" }
getrandom_02 = { package = "getrandom", version = "0.2.16", features = ["js"] }
getrandom_04 = { package = "getrandom", version = "0.4.2", features = ["wasm_js"] }
console_error_panic_hook = "0.1.7"

[dev-dependencies]
rand08 = { package = "rand", version = "0.8.5" }

