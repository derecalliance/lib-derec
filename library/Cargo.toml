[package]
name = "derec-library"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
derec-cryptography = { path = "../cryptography" }
prost = "0.12"
prost-types = "0.12"
rand = "0.8.5"
sha2 = "0.10.9"
serde = { version = "1.0", features = ["derive"] }
ark-serialize = { version = "0.5.0", default-features = true }
thiserror = "2.0.18"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { version = "0.2.114", features = ["serde-serialize"] }
serde-wasm-bindgen = { version = "0.6.5" }
js-sys = { version = "0.3.91" }

[build-dependencies]
prost-build = "0.12"
